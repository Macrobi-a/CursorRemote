# CI: verify app and master graph load and compile (no deploy)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify master graph and checkpointer
        run: |
          cd "$GITHUB_WORKSPACE"
          export PYTHONPATH="$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/output:$PYTHONPATH"
          python -c "
          from pathlib import Path
          import sys
          sys.path.insert(0, str(Path('output').resolve()))
          from master_graph import get_graph_for_chainlit
          from langgraph.checkpoint.memory import MemorySaver
          cp = MemorySaver()
          g = get_graph_for_chainlit(cp)
          assert g is not None
          print('OK: graph compiles with MemorySaver')
          "

      - name: Verify app imports
        run: |
          cd "$GITHUB_WORKSPACE"
          export PYTHONPATH="$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/output:$PYTHONPATH"
          python -c "
          import sys
          sys.path.insert(0, 'output')
          import app
          print('OK: app imports')
          "
